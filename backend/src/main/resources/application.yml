server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: rental-platform
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:house_rental_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

jwt:
  secret: ${JWT_SECRET:TXlTdXBlclNlY3JldEtleUZvclJlbnRhbFBsYXRmb3JtTXlTdXBlclNlY3JldEtleQ==}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  upload-dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  admin:
    email: ${ADMIN_EMAIL:admin@rentify.com}
    password: ${ADMIN_PASSWORD:admin123}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

ai:
  provider:
    url: ${AI_API_URL:https://chatgpt-42.p.rapidapi.com/chat}
    rapidapi-key: ${RAPIDAPI_KEY:}
    rapidapi-host: ${RAPIDAPI_HOST:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
